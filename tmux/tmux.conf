# Core settings
set-option -g status-position bottom
set -g mouse on
set -g history-limit 50000

# Fix slow escape times (improves vim responsiveness)
set -sg escape-time 10

# Refresh the status bar every 5 seconds (default is 15)
set -g status-interval 5

# Increase the length limits for the left and right sections (default is 10 and 40)
set -g status-left-length 40
set -g status-right-length 80

# Define characters that act as delimiters for double-click word selection
set -g word-separators " |{}()[]<>`='\"!@#$%^&*:;,?"

# Center align the window list (can also be 'left' or 'right')
set -g status-justify left

# Monitor background window activity and show a subtle indicator in the status bar
set -g monitor-activity on

# Prevent annoying visual flashes or audio dings when activity occurs
set -g activity-action none


# Enable true color support so your status bar theme looks accurate
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Cc=\E]12;%p1%s\007:Cr=\E]112\007"

# Status bar general background and foreground colors
set -g status-style bg=default,fg="#8ab4f8"

# Customize the left status block (shows current session name)
set -g status-left "#[fg=#b4befe,bold]    #S #[fg=#44475a,nobold]| "

# Customize the right status block (shows Date and Time with custom format)
set -g status-right "#[fg=#44475a]| #[fg=#f9e2af,bold]   %I:%M %p #[fg=#44475a]| #[fg=#a6e3a1,bold] %b %d "

# Format for inactive/background windows
set -g window-status-format "#[fg=#585b70] #I:#W "

# Format for the currently active window (highlighted style)
set -g window-status-current-format "#[fg=#11111b,bg=#8ab4f8,bold] #I:#W "



# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf


# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D


# -----------------------------------------------------------------------------
# macOS Clipboard Integration (using pbcopy)
# -----------------------------------------------------------------------------
# Use vi keys in copy mode
setw -g mode-keys vi

# Setup 'v' to begin selection, 'y' to copy to macOS clipboard
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-keys-and-cancel "pbcopy"

# Update default binding of `Enter` to also use pbcopy
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send -X copy-keys-and-cancel "pbcopy"
